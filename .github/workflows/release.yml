name: Release

on:
  push:
    branches:
      - main        # every commit publishes a rolling "nightly" prerelease
    tags:
      - 'v*'        # explicit tag publishes a stable release

permissions:
  contents: write   # needed to create/replace GitHub Releases and tags

jobs:
  release:
    name: Build, sign, package, release
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Determine release params
        id: params
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            TITLE="Brygga ${VERSION}"
            ROLLING=false
          else
            # Rolling build on main — delete+recreate a stable 'nightly'
            # tag so friends can bookmark `releases/tag/nightly`.
            TAG="nightly"
            SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
            VERSION="0.1.0-nightly.${{ github.run_number }}+${SHORT_SHA}"
            TITLE="Brygga nightly (build ${{ github.run_number }} — ${SHORT_SHA})"
            ROLLING=true
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "title=$TITLE"
            echo "rolling=$ROLLING"
          } >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Build release .app
        env:
          VERSION: ${{ steps.params.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./Scripts/build-app.sh release

      - name: Ad-hoc codesign
        run: |
          # Sign with nothing ("-") so GateKeeper sees a consistent identity.
          # Users still see a "can't verify developer" prompt on first launch;
          # right-click → Open bypasses it. Proper Developer-ID notarization
          # needs a paid Apple account and is deliberately out of scope.
          codesign --force --deep --sign - build/Brygga.app
          codesign --verify --verbose build/Brygga.app

      - name: Create DMG
        run: |
          mkdir -p dist
          DMG="dist/Brygga-${{ steps.params.outputs.tag }}.dmg"
          hdiutil create \
            -volname "Brygga ${{ steps.params.outputs.version }}" \
            -srcfolder build/Brygga.app \
            -ov -format UDZO \
            "$DMG"
          ls -la dist/

      - name: Replace rolling release (if applicable)
        if: steps.params.outputs.rolling == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the previous nightly prerelease + its tag so the next
          # step can recreate them at this commit. Also delete the legacy
          # 'latest' tag from pre-split builds so we don't leave a ghost.
          gh release delete nightly --yes --cleanup-tag || true
          gh release delete latest --yes --cleanup-tag || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.params.outputs.tag }}
          name: ${{ steps.params.outputs.title }}
          draft: false
          prerelease: ${{ steps.params.outputs.rolling == 'true' }}
          generate_release_notes: true
          files: dist/Brygga-*.dmg
          target_commitish: ${{ github.sha }}
          body: |
            ## Installation

            1. Download the DMG, open it, drag **Brygga.app** to `/Applications`.
            2. First launch: macOS will say the app can't be verified. Right-click (or Ctrl-click) → **Open** → confirm. This is because the binary is ad-hoc signed, not Developer-ID signed.
            3. If Gatekeeper still refuses (e.g. *"Apple could not verify Brygga is free of malware"* with no **Open** override), strip the quarantine attribute from the installed bundle and try again:

               ```sh
               xattr -cr /Applications/Brygga.app
               ```

            4. Requires **macOS 15 Sequoia or later, Apple Silicon only**.

            ## Release channels

            Brygga ships two tracks:

            - **Stable** — tagged `v*` releases, cut manually. Pointed to by GitHub's *Latest release* badge.
            - **Nightly** — [`releases/tag/nightly`](../../releases/tag/nightly). Rebuilt automatically on every push to `main`; the tag is deleted and recreated each time so the URL is always current. Prerelease-marked.

            Commit: `${{ github.sha }}`
