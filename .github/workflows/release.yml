name: Release

on:
  push:
    branches:
      - main        # every commit publishes a rolling "nightly" prerelease
    paths-ignore:
      # Docs-only and GitHub-metadata pushes should not cut a new nightly DMG.
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
      - '.github/FUNDING.yml'
      - '.github/dependabot.yml'
    tags:
      - 'v*'        # explicit tag publishes a stable release (paths-ignore does not apply to tag pushes)

permissions:
  contents: write   # needed to create/replace GitHub Releases and tags

jobs:
  release:
    name: Build, sign, package, release
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Determine release params
        id: params
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            TITLE="Brygga ${VERSION}"
            ROLLING=false
          else
            # Rolling build on main — delete+recreate a stable 'nightly'
            # tag so friends can bookmark `releases/tag/nightly`.
            TAG="nightly"
            SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
            VERSION="0.1.0-nightly.${{ github.run_number }}+${SHORT_SHA}"
            TITLE="Brygga nightly (build ${{ github.run_number }} — ${SHORT_SHA})"
            ROLLING=true
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "title=$TITLE"
            echo "rolling=$ROLLING"
          } >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Build release .app
        env:
          VERSION: ${{ steps.params.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./Scripts/build-app.sh release

      - name: Ad-hoc codesign
        run: |
          # Sign with nothing ("-") so GateKeeper sees a consistent identity.
          # Users still see a "can't verify developer" prompt on first launch;
          # right-click → Open bypasses it. Proper Developer-ID notarization
          # needs a paid Apple account and is deliberately out of scope.
          codesign --force --deep --sign - build/Brygga.app
          codesign --verify --verbose build/Brygga.app

      - name: Create DMG
        run: |
          set -euo pipefail
          mkdir -p dist
          STAGING="$(mktemp -d)/dmg-staging"
          mkdir -p "$STAGING"

          # Layout: Brygga.app on the left, Applications shortcut on the right.
          # The symlink is what gives users the familiar drag-to-install UX.
          cp -a build/Brygga.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          VOLNAME="Brygga ${{ steps.params.outputs.version }}"
          TMP_DMG="dist/Brygga-tmp.dmg"
          FINAL_DMG="dist/Brygga-${{ steps.params.outputs.tag }}.dmg"

          # 1) Build a writable UDRW image so we can arrange icons in-place.
          hdiutil create \
            -volname "$VOLNAME" \
            -srcfolder "$STAGING" \
            -ov -format UDRW \
            "$TMP_DMG"

          # 2) Mount, try to set window size + icon positions via Finder,
          #    then detach. AppleScript can be flaky on headless runners;
          #    if it fails the DMG is still perfectly usable (just without
          #    the custom layout), so we swallow errors and move on.
          MOUNT_DIR="/Volumes/$VOLNAME"
          hdiutil attach -readwrite -noverify -noautoopen "$TMP_DMG" >/dev/null

          osascript <<EOF || echo "note: DMG layout AppleScript failed; shipping plain symlinked DMG"
          tell application "Finder"
              tell disk "$VOLNAME"
                  open
                  set current view of container window to icon view
                  set toolbar visible of container window to false
                  set statusbar visible of container window to false
                  set the bounds of container window to {200, 200, 720, 520}
                  set viewOptions to the icon view options of container window
                  set arrangement of viewOptions to not arranged
                  set icon size of viewOptions to 96
                  set position of item "Brygga.app" of container window to {140, 160}
                  set position of item "Applications" of container window to {380, 160}
                  close
                  open
                  update without registering applications
                  delay 1
              end tell
          end tell
          EOF

          sync
          hdiutil detach "$MOUNT_DIR" >/dev/null

          # 3) Convert the writable DMG to the final compressed UDZO form.
          hdiutil convert "$TMP_DMG" -format UDZO -imagekey zlib-level=9 -o "$FINAL_DMG"
          rm -f "$TMP_DMG"

          ls -la dist/

      - name: Replace rolling release (if applicable)
        if: steps.params.outputs.rolling == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the previous nightly prerelease + its tag so the next
          # step can recreate them at this commit. Also delete the legacy
          # 'latest' tag from pre-split builds so we don't leave a ghost.
          gh release delete nightly --yes --cleanup-tag || true
          gh release delete latest --yes --cleanup-tag || true

      - name: Bump Homebrew tap (stable releases only)
        if: steps.params.outputs.rolling == 'false'
        env:
          TAP_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ steps.params.outputs.version }}
          TAG: ${{ steps.params.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_REPO_TOKEN not configured; skipping Homebrew bump"
            exit 0
          fi

          DMG="dist/Brygga-${TAG}.dmg"
          SHA256="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          echo "Bumping buggerman/homebrew-brygga :: brygga to ${VERSION} (sha256=${SHA256})"

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/buggerman/homebrew-brygga.git" tap
          cd tap

          CASK=Casks/brygga.rb

          # BSD sed on macos-26. Anchor to line start and exact field names so
          # we only touch the two lines we mean to.
          sed -i '' -E "s|^  version \"[^\"]*\"\$|  version \"${VERSION}\"|" "$CASK"
          sed -i '' -E "s|^  sha256 \"[0-9a-f]*\"\$|  sha256 \"${SHA256}\"|" "$CASK"

          # Verify both edits landed; otherwise fail loud rather than pushing a
          # half-edited cask.
          grep -qE "^  version \"${VERSION}\"\$" "$CASK" || { echo "::error::version bump failed for $CASK"; exit 1; }
          grep -qE "^  sha256 \"${SHA256}\"\$" "$CASK" || { echo "::error::sha256 bump failed for $CASK"; exit 1; }

          if git diff --quiet; then
            echo "Cask already at ${VERSION} / ${SHA256} — nothing to push"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "Bump brygga to ${VERSION}"
          git push origin main

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.params.outputs.tag }}
          name: ${{ steps.params.outputs.title }}
          draft: false
          prerelease: ${{ steps.params.outputs.rolling == 'true' }}
          generate_release_notes: true
          files: dist/Brygga-*.dmg
          target_commitish: ${{ github.sha }}
          body: |
            ## Installation

            1. Download the DMG, open it, drag **Brygga.app** to `/Applications`.
            2. First launch: macOS will say the app can't be verified. Right-click (or Ctrl-click) → **Open** → confirm. This is because the binary is ad-hoc signed, not Developer-ID signed.
            3. If Gatekeeper still refuses (e.g. *"Apple could not verify Brygga is free of malware"* with no **Open** override), strip the quarantine attribute from the installed bundle and try again:

               ```sh
               xattr -cr /Applications/Brygga.app
               ```

            4. Requires **macOS 15 Sequoia or later, Apple Silicon only**.

            ## Release channels

            Brygga ships two tracks:

            - **Stable** — tagged `v*` releases, cut manually. Pointed to by GitHub's *Latest release* badge.
            - **Nightly** — [`releases/tag/nightly`](../../releases/tag/nightly). Rebuilt automatically on every push to `main`; the tag is deleted and recreated each time so the URL is always current. Prerelease-marked.

            Commit: `${{ github.sha }}`
