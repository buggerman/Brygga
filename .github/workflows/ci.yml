name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
      - '.github/FUNDING.yml'
      - '.github/dependabot.yml'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
      - '.github/FUNDING.yml'
      - '.github/dependabot.yml'

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Lint formatting
        run: swiftformat --lint .

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
